# Ranger Mini v3 keeps the proven DWB path follower but replaces its terminal
# latches: Humble resets stock goal/RotateToGoal state on every global replan,
# which can re-enable translation after skid-steer rotation drifts XY.
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
    tf_buffer_duration: 0.5  # 秒

    
controller_server:
  ros__parameters:
    use_sim_time: false
    odom_topic: "__ROBONIX_ODOM_TOPIC__"
    controller_frequency: 5.0
    # min_x_velocity_threshold: 0.01
    # min_y_velocity_threshold: 0.01
    # min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 30.0
    # Goal checker parameters
    general_goal_checker:
      # ControllerServer resets ordinary goal checkers on every global replan.
      # This checker preserves the same-goal terminal latch with hysteresis.
      plugin: "robonix_nav2_terminal::PersistentGoalChecker"
      xy_enter_tolerance: 0.30
      xy_exit_tolerance: 0.45
      yaw_enter_tolerance: 0.12
      yaw_exit_tolerance: 0.20
      stopped_linear_velocity: 0.05
      stopped_angular_velocity: 0.05
    # DWB parameters
    FollowPath:
      # Keep final-heading control inside DWB. The RotationShim experiment
      # repeatedly re-entered in-place rotation after wheel-slip changed XY.
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.00
      min_vel_y: 0.0
      max_vel_x: 0.3
      max_vel_y: 0.0
      max_vel_theta: 0.6
      # min_vel_theta: 0.05
      min_speed_xy: 0.0
      max_speed_xy: 0.4
      # Include zero and very small yaw commands so the terminal latch can
      # settle instead of oscillating around a nonzero minimum speed.
      min_speed_theta: 0.0
      # Add high threshold velocity for turtlebot 3 issue.
      # https://github.com/ROBOTIS-GIT/turtlebot3_simulations/issues/75
      acc_lim_x: 0.5
      acc_lim_y: 0.0
      acc_lim_theta: 1.0
      decel_lim_x: -0.5
      decel_lim_y: -0.0
      decel_lim_theta: -1.0
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 120
      sim_time: 3.0
      linear_granularity: 0.05
      angular_granularity: 0.05
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.12
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["PersistentRotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.015
      PathAlign.scale: 1.0
      # PathAlign.forward_point_distance: 0.1
      # PathAlign.forward_preference: true
      GoalAlign.scale: 0.2
      # GoalAlign.forward_point_distance: 0.1
      # GoalAlign.forward_preference: true
      PathDist.scale: 0.5
      GoalDist.scale: 2.0
      PersistentRotateToGoal.class: "robonix_nav2_terminal::PersistentRotateToGoalCritic"
      PersistentRotateToGoal.xy_enter_tolerance: 0.30
      PersistentRotateToGoal.xy_exit_tolerance: 0.45
      PersistentRotateToGoal.yaw_enter_tolerance: 0.12
      PersistentRotateToGoal.yaw_exit_tolerance: 0.20
      PersistentRotateToGoal.stopped_linear_velocity: 0.05
      PersistentRotateToGoal.max_terminal_angular_velocity: 0.30
      PersistentRotateToGoal.slowing_factor: 3.0
      PersistentRotateToGoal.lookahead_time: 0.5
      PersistentRotateToGoal.max_terminal_duration: 15.0
      PersistentRotateToGoal.no_progress_timeout: 3.0
      PersistentRotateToGoal.min_yaw_progress: 0.04
      PersistentRotateToGoal.rotation_margin: 0.50
    

bt_navigator:
  ros__parameters:
    use_sim_time: false
    # The Ranger controller/planner run at 5 Hz. A 100 Hz BT loop repeatedly
    # starved action acknowledgement callbacks on Jetson; 20 Hz keeps steering
    # responsive without manufacturing server timeouts under SLAM load.
    bt_loop_duration: 50
    default_server_timeout: 1000
    # Packaged v0.1 tree: one recovery attempt and no physical recovery spin.
    # Humble reads default_nav_to_pose_bt_xml. Keep the legacy key too for
    # compatibility with older Nav2 releases, but both must select the same
    # non-physical recovery tree.
    default_bt_xml_filename: "__ROBONIX_BT_XML__"
    default_nav_to_pose_bt_xml: "__ROBONIX_BT_XML__"
    tf_buffer_duration: 0.5

recoveries_server:
  ros__parameters:
    costmap_topic: global_costmap/costmap
    footprint_topic: global_costmap/published_footprint

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "__ROBONIX_FOOTPRINT__"
      footprint_padding: 0.05
      # robot_radius: 0.32
      
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: "__ROBONIX_SCAN_TOPIC__"
          max_obstacle_height: 2.0
          marking: true
          clearing: true
          qos:
            reliability: best_effort
            durability: volatile

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.60


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map          # 通常是 map
      robot_base_frame: base_link
      # robot_radius: 0.32
      footprint: "__ROBONIX_FOOTPRINT__"
      footprint_padding: 0.05
      update_frequency: 1.0      # 更新频率（Hz），比 local_costmap 低即可
      publish_frequency: 1.0     # 发布频率
      resolution: 0.05           # 分辨率，建议和地图一致

      rolling_window: false      # 🚫 不要滚动，通常设置为 false
      track_unknown_space: true  # 路径规划时是否考虑未知区域
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "__ROBONIX_MAP_TOPIC__"
        map_subscribe_transient_local: true
        enabled: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: "__ROBONIX_SCAN_TOPIC__"
          max_obstacle_height: 2.0
          marking: true
          clearing: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 2.00


lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - planner_server
      - controller_server
      - bt_navigator
      - recoveries_server
